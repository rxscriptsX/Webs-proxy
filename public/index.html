<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waevo Proxy</title>

    <!-- Scripts originales (intocados) -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>

    <!-- Registro del Service Worker (intocado) -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", {
                    scope: __uv$config.prefix,
                });
            });
        }
    </script>

    <!-- Tus estilos originales (se mantienen) -->
    <link rel="stylesheet" href="example.css">

    <!-- Diseño añadido (pantalla completa, botones organizados) -->
    <style>
        :root {
            --cyan: #00f5ff;
            --purple: #7b2dff;
            --bg: #020810;
            --surface: #060e1a;
            --border: rgba(0,245,255,0.15);
            --text: #c0d8e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;                     /* Ocupa toda la ventana */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 1rem 1rem;
            overflow: hidden;                 /* Evita scroll innecesario en el body */
        }

        /* Bloque superior: barra + botón + estado */
        .search-section {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        #urlInput {
            width: 100%;
            background: rgba(0,245,255,0.04);
            border: 1px solid rgba(0,245,255,0.2);
            border-radius: 6px;
            color: var(--cyan);
            font-family: inherit;
            font-size: 1rem;
            padding: 0.9rem 1.2rem;
            outline: none;
            transition: all 0.3s;
            caret-color: var(--cyan);
        }

        #urlInput:focus {
            border-color: var(--cyan);
            background: rgba(0,245,255,0.08);
            box-shadow: 0 0 20px rgba(0,245,255,0.1);
        }

        #urlInput::placeholder {
            color: rgba(0,245,255,0.25);
        }

        #searchButton {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 6px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 0.75rem 2.5rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #searchButton:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(0,245,255,0.4);
        }

        #searchButton:active {
            transform: scale(0.97);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.65rem;
            color: rgba(0,245,255,0.4);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 6px #00ff88;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* El iframe ocupa el resto de la pantalla */
        .iframe-container {
            width: 100%;
            flex: 1;                          /* Se estira para ocupar el espacio sobrante */
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
        }

        #iframeWindow {
            width: 100%;
            height: 100%;                     /* Ocupa todo el contenedor */
            border: none;
            display: block;
        }

        /* Footer sutil */
        .footer {
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            color: rgba(0,245,255,0.15);
            text-align: center;
            padding-bottom: 0.3rem;
        }
    </style>
</head>
<body>

    <!-- Elementos originales (sin modificar) -->
    <div class="search-section">
        <input type="text" id="urlInput" placeholder="Enter URL here">
        <button id="searchButton">Search Text</button>
        <div class="status">
            <span class="dot"></span>
            PROXY ACTIVO · ULTRAVIOLET · ENCRIPTADO
        </div>
    </div>

    <!-- Iframe que crece automáticamente -->
    <div class="iframe-container">
        <iframe id="iframeWindow" class="iframeWindow"></iframe>
    </div>

    <div class="footer">
        WAEVO PROXY &copy; 2025
    </div>

    <!-- Script funcional original (intocado) -->
    <script src="example.js"></script>
</body>
</html>
