<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waevo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan: #00f5ff;
      --pink: #ff2d6b;
      --purple: #7b2dff;
      --bg: #020810;
      --surface: #060e1a;
      --border: rgba(0,245,255,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #c0d8e8;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grid animado de fondo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 8s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Orbes de luz */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 10s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: var(--cyan); top: -150px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: var(--purple); bottom: -100px; right: -100px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: var(--pink); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -7s; opacity: 0.07; }

    @keyframes orbFloat {
      0%, 100% { transform: scale(1) translate(0,0); }
      33%       { transform: scale(1.1) translate(20px, -20px); }
      66%       { transform: scale(0.95) translate(-15px, 15px); }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 2rem;
      width: 100%;
    }

    /* Logo */
    .logo-wrap {
      text-align: center;
      animation: fadeDown 0.8s ease both;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(0,245,255,0.4));
      position: relative;
    }

    /* Glitch effect en el logo */
    .logo::before,
    .logo::after {
      content: 'WAEVO';
      position: absolute;
      top: 0; left: 0; right: 0;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo::before {
      animation: glitch1 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }
    .logo::after {
      animation: glitch2 4s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }

    @keyframes glitch1 {
      0%, 90%, 100% { transform: none; opacity: 0; }
      92% { transform: translateX(-3px); opacity: 0.8; filter: hue-rotate(90deg); }
      94% { transform: translateX(3px); opacity: 0.8; }
      96% { transform: none; opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 90%, 100% { transform: none; opacity: 0; }
      93% { transform: translateX(3px); opacity: 0.8; filter: hue-rotate(-90deg); }
      95% { transform: translateX(-3px); opacity: 0.8; }
      97% { transform: none; opacity: 0; }
    }

    .tagline {
      margin-top: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.5em;
      color: var(--cyan);
      opacity: 0.5;
      text-transform: uppercase;
    }

    /* Card principal */
    .card {
      background: rgba(6,14,26,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 700px;
      position: relative;
      animation: fadeUp 0.8s 0.2s ease both;
      box-shadow:
        0 0 0 1px rgba(0,245,255,0.04),
        0 0 80px rgba(0,245,255,0.06),
        inset 0 1px 0 rgba(0,245,255,0.08);
    }

    /* Línea superior brillante */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scanLine 3s ease-in-out infinite;
    }

    @keyframes scanLine {
      0%, 100% { opacity: 0.3; left: 10%; right: 10%; }
      50%       { opacity: 1; left: 5%; right: 5%; }
    }

    /* Esquinas decorativas */
    .corner { position: absolute; width: 16px; height: 16px; border-color: var(--cyan); border-style: solid; opacity: 0.5; }
    .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .card-label {
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      color: rgba(0,245,255,0.35);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Barra de búsqueda */
    .search-wrap {
      display: flex;
      position: relative;
    }

    .search-input {
      flex: 1;
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.2);
      border-right: none;
      border-radius: 3px 0 0 3px;
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 1rem 1.2rem;
      outline: none;
      transition: all 0.3s;
      caret-color: var(--cyan);
    }

    .search-input::placeholder { color: rgba(0,245,255,0.2); }

    .search-input:focus {
      border-color: rgba(0,245,255,0.6);
      background: rgba(0,245,255,0.07);
      box-shadow: 0 0 30px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,245,255,0.03);
    }

    .search-btn {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border: none;
      border-radius: 0 3px 3px 0;
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 1rem 1.8rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .search-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .search-btn:hover::before { transform: translateX(100%); }
    .search-btn:hover { filter: brightness(1.2); box-shadow: 0 0 25px rgba(0,245,255,0.5); }
    .search-btn:active { transform: scale(0.97); }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1rem;
      font-size: 0.65rem;
      color: rgba(0,245,255,0.3);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Quick links */
    .quicklinks {
      margin-top: 1.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .ql-label {
      width: 100%;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: rgba(0,245,255,0.25);
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .qlink {
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.1);
      border-radius: 2px;
      color: rgba(0,245,255,0.45);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .qlink:hover {
      background: rgba(0,245,255,0.1);
      border-color: rgba(0,245,255,0.4);
      color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,245,255,0.2);
      transform: translateY(-1px);
    }

    /* Footer */
    .footer {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: rgba(0,245,255,0.15);
      text-align: center;
      animation: fadeUp 0.8s 0.4s ease both;
    }
    .footer span { color: var(--pink); }

    /* Loading */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.2rem;
    }
    #loading.active { display: flex; }

    .load-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 1s infinite;
    }

    .load-text {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: rgba(0,245,255,0.4);
      animation: pulse 1s infinite;
    }

    .load-bar {
      width: 220px; height: 1px;
      background: rgba(0,245,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .load-bar::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: loadSlide 1s infinite;
    }

    @keyframes loadSlide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-25px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Orbes de fondo -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Loading screen -->
<div id="loading">
  <div class="load-logo">WAEVO</div>
  <div class="load-bar"></div>
  <div class="load-text">CONECTANDO...</div>
</div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo">WAEVO</div>
    <div class="tagline">Navegación sin límites · Privado · Seguro</div>
  </div>

  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="card-label">// Ingresa una URL o búsqueda</div>

    <div class="search-wrap">
      <input
        class="search-input"
        id="url"
        type="text"
        placeholder="https://google.com  o  buscar algo..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" onclick="go()">ENTRAR</button>
    </div>

    <div class="status">
      <div class="dot"></div>
      <span>PROXY ACTIVO · ULTRAVIOLET · ENCRIPTADO</span>
    </div>

    <div class="quicklinks">
      <div class="ql-label">// acceso rápido</div>
      <a class="qlink" onclick="setUrl('https://google.com')">Google</a>
      <a class="qlink" onclick="setUrl('https://youtube.com')">YouTube</a>
      <a class="qlink" onclick="setUrl('https://reddit.com')">Reddit</a>
      <a class="qlink" onclick="setUrl('https://twitter.com')">Twitter/X</a>
      <a class="qlink" onclick="setUrl('https://discord.com')">Discord</a>
      <a class="qlink" onclick="setUrl('https://github.com')">GitHub</a>
      <a class="qlink" onclick="setUrl('https://instagram.com')">Instagram</a>
      <a class="qlink" onclick="setUrl('https://spotify.com')">Spotify</a>
    </div>
  </div>

  <div class="footer">
    WAEVO PROXY · POWERED BY ULTRAVIOLET · BUILT BY <span>ALEX</span>
  </div>
</div>

<!-- Scripts originales del proxy -->
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
  async function registerSW() {
    if (!('serviceWorker' in navigator)) {
      console.warn('Service Worker no soportado');
      return;
    }
    // Si ya estamos dentro del scope del SW, no hacer nada
    if (window.location.pathname.startsWith(__uv$config.prefix)) {
      console.log('Ya dentro del scope del SW');
      return;
    }
    try {
      const swPath = __uv$config.sw;
      const reg = await navigator.serviceWorker.register(swPath, {
        scope: __uv$config.prefix,
      });
      console.log('SW registrado, scope:', reg.scope);
      // Esperar a que esté listo y luego redirigir si no controla
      await navigator.serviceWorker.ready;
      if (!navigator.serviceWorker.controller) {
        console.log('Redirigiendo a /uv/service/index');
        window.location.replace('/uv/service/index');
      }
    } catch (e) {
      console.error('Error al registrar SW:', e);
    }
  }

  async function go() {
    const input = document.getElementById('url').value.trim();
    if (!input) return;
    let url = input;
    if (!/^https?:\/\//i.test(url)) {
      if (/^[\w-]+(\.\w+)+/.test(url)) {
        url = 'https://' + url;
      } else {
        url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
      }
    }
    document.getElementById('loading').classList.add('active');
    location.assign(__uv$config.prefix + __uv$config.encodeUrl(url));
  }

  function setUrl(url) {
    document.getElementById('url').value = url;
    go();
  }

  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') go();
  });

  registerSW();
</script>
</body>
</html>
