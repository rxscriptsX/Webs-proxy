<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waevo Proxy</title>

    <!-- Scripts originales (intocados) -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>

    <!-- Registro del Service Worker (intocado) -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", {
                    scope: __uv$config.prefix,
                });
            });
        }
    </script>

    <!-- Tus estilos originales (se mantienen) -->
    <link rel="stylesheet" href="example.css">

    <!-- Diseño añadido (solo visual, no toca nada funcional) -->
    <style>
        :root {
            --cyan: #00f5ff;
            --purple: #7b2dff;
            --bg: #020810;
            --surface: #060e1a;
            --border: rgba(0,245,255,0.15);
            --text: #c0d8e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;  /* Alinea el contenido hacia arriba para luego empujar el input hacia abajo */
            padding: 2rem 1rem;
        }

        /* Empuja la barra de búsqueda más abajo */
        #urlInput {
            margin-top: 8vh;  /* La baja un poco sin pasarse */
            display: block;
            width: 100%;
            max-width: 600px;
            background: rgba(0,245,255,0.04);
            border: 1px solid rgba(0,245,255,0.2);
            border-radius: 6px;
            color: var(--cyan);
            font-family: inherit;
            font-size: 1rem;
            padding: 1rem 1.2rem;
            outline: none;
            transition: all 0.3s;
            caret-color: var(--cyan);
            margin-left: auto;
            margin-right: auto;
        }

        #urlInput:focus {
            border-color: var(--cyan);
            background: rgba(0,245,255,0.08);
            box-shadow: 0 0 20px rgba(0,245,255,0.1);
        }

        #urlInput::placeholder {
            color: rgba(0,245,255,0.25);
        }

        /* Botón justo debajo de la barra */
        #searchButton {
            display: block;
            margin: 1rem auto 0 auto;  /* Justo debajo, centrado */
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 6px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 0.9rem 2rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #searchButton:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(0,245,255,0.4);
        }

        #searchButton:active {
            transform: scale(0.97);
        }

        /* Línea de estado debajo del botón (opcional pero bonito) */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            margin-top: 1.5rem;
            font-size: 0.65rem;
            color: rgba(0,245,255,0.4);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 6px #00ff88;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Contenedor del iframe */
        .iframe-container {
            width: 100%;
            max-width: 1000px;
            margin-top: 2rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #iframeWindow {
            width: 100%;
            height: 65vh;
            border: none;
            display: block;
        }

        /* Pequeño footer */
        .footer {
            margin-top: 1.5rem;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: rgba(0,245,255,0.2);
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Elementos originales (intocados en orden y tipo) -->
    <input type="text" id="urlInput" placeholder="Enter URL here">
    <button id="searchButton">Search Text</button>

    <!-- Pequeño indicador de estado (opcional, sin afectar funcionalidad) -->
    <div class="status">
        <span class="dot"></span>
        PROXY ACTIVO · ULTRAVIOLET · ENCRIPTADO
    </div>

    <!-- Iframe envuelto para darle estilo -->
    <div class="iframe-container">
        <iframe id="iframeWindow" class="iframeWindow"></iframe>
    </div>

    <div class="footer">
        WAEVO PROXY &copy; 2025
    </div>

    <!-- Script funcional original (intocado) -->
    <script src="example.js"></script>
</body>
</html>
