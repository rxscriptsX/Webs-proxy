<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Waevo</title>

    <!-- Scripts originales exactamente igual que tu versión corta -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("/uv/sw.js", {
                scope: __uv$config.prefix,
            });
        });
    }
    </script>

    <!-- Tu example.css original (se mantiene) -->
    <link rel="stylesheet" href="example.css">

    <!-- Estilos de diseño WAEVO (no afectan al sistema, solo decoran) -->
    <style>
        :root {
            --cyan: #00f5ff;
            --pink: #ff2d6b;
            --purple: #7b2dff;
            --bg: #020810;
            --surface: #060e1a;
            --border: rgba(0,245,255,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #c0d8e8;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Grid animado de fondo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 8s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0%   { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Orbes de luz */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 10s ease-in-out infinite;
        }
        .orb1 { width: 500px; height: 500px; background: var(--cyan); top: -150px; left: -150px; }
        .orb2 { width: 400px; height: 400px; background: var(--purple); bottom: -100px; right: -100px; animation-delay: -4s; }
        .orb3 { width: 300px; height: 300px; background: var(--pink); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -7s; opacity: 0.07; }

        @keyframes orbFloat {
            0%, 100% { transform: scale(1) translate(0,0); }
            33%       { transform: scale(1.1) translate(20px, -20px); }
            66%       { transform: scale(0.95) translate(-15px, 15px); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
            width: 100%;
        }

        /* Logo */
        .logo-wrap {
            text-align: center;
            animation: fadeDown 0.8s ease both;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(0,245,255,0.4));
            position: relative;
        }

        /* Glitch effect */
        .logo::before,
        .logo::after {
            content: 'WAEVO';
            position: absolute;
            top: 0; left: 0; right: 0;
            background: inherit;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo::before {
            animation: glitch1 4s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }
        .logo::after {
            animation: glitch2 4s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitch1 {
            0%, 90%, 100% { transform: none; opacity: 0; }
            92% { transform: translateX(-3px); opacity: 0.8; filter: hue-rotate(90deg); }
            94% { transform: translateX(3px); opacity: 0.8; }
            96% { transform: none; opacity: 0; }
        }
        @keyframes glitch2 {
            0%, 90%, 100% { transform: none; opacity: 0; }
            93% { transform: translateX(3px); opacity: 0.8; filter: hue-rotate(-90deg); }
            95% { transform: translateX(-3px); opacity: 0.8; }
            97% { transform: none; opacity: 0; }
        }

        .tagline {
            margin-top: 0.4rem;
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            color: var(--cyan);
            opacity: 0.5;
            text-transform: uppercase;
        }

        /* Card */
        .card {
            background: rgba(6,14,26,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2rem;
            width: 100%;
            max-width: 700px;
            position: relative;
            animation: fadeUp 0.8s 0.2s ease both;
            box-shadow: 0 0 0 1px rgba(0,245,255,0.04), 0 0 80px rgba(0,245,255,0.06), inset 0 1px 0 rgba(0,245,255,0.08);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scanLine 3s ease-in-out infinite;
        }

        @keyframes scanLine {
            0%, 100% { opacity: 0.3; left: 10%; right: 10%; }
            50%       { opacity: 1; left: 5%; right: 5%; }
        }

        .corner { position: absolute; width: 16px; height: 16px; border-color: var(--cyan); border-style: solid; opacity: 0.5; }
        .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        .card-label {
            font-size: 0.62rem;
            letter-spacing: 0.35em;
            color: rgba(0,245,255,0.35);
            text-transform: uppercase;
        }

        .search-wrap {
            display: flex;
        }

        .search-input {
            flex: 1;
            background: rgba(0,245,255,0.04);
            border: 1px solid rgba(0,245,255,0.2);
            border-right: none;
            border-radius: 3px 0 0 3px;
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            padding: 1rem 1.2rem;
            outline: none;
            transition: all 0.3s;
            caret-color: var(--cyan);
        }

        .search-input::placeholder { color: rgba(0,245,255,0.2); }

        .search-input:focus {
            border-color: rgba(0,245,255,0.6);
            background: rgba(0,245,255,0.07);
            box-shadow: 0 0 30px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,245,255,0.03);
        }

        .search-btn {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 0 3px 3px 0;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            padding: 1rem 1.8rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .search-btn:hover { filter: brightness(1.2); box-shadow: 0 0 25px rgba(0,245,255,0.5); }
        .search-btn:active { transform: scale(0.97); }

        /* Quick links */
        .quicklinks {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .ql-label {
            width: 100%;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: rgba(0,245,255,0.25);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .qlink {
            background: rgba(0,245,255,0.04);
            border: 1px solid rgba(0,245,255,0.1);
            border-radius: 2px;
            color: rgba(0,245,255,0.45);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem;
            padding: 0.4rem 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            user-select: none;
        }

        .qlink:hover {
            background: rgba(0,245,255,0.1);
            border-color: rgba(0,245,255,0.4);
            color: var(--cyan);
            box-shadow: 0 0 12px rgba(0,245,255,0.2);
            transform: translateY(-1px);
        }

        /* Iframe */
        .iframeWindow {
            width: 100%;
            height: 500px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #000;
        }

        /* Footer */
        .footer {
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            color: rgba(0,245,255,0.15);
            text-align: center;
            animation: fadeUp 0.8s 0.4s ease both;
        }
        .footer span { color: var(--pink); }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-25px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Fuente */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    </style>
</head>
<body>
    <!-- Orbes de fondo -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="container">
        <!-- Logo y tagline -->
        <div class="logo-wrap">
            <div class="logo">WAEVO</div>
            <div class="tagline">Navegación sin límites · Privado · Seguro</div>
        </div>

        <!-- Card principal que envuelve el sistema original -->
        <div class="card">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <div class="card-label">// Ingresa una URL o búsqueda</div>

            <!-- ELEMENTOS ORIGINALES (mismos IDs y estructura) -->
            <div class="search-wrap">
                <input type="text" id="urlInput" class="search-input" placeholder="https://google.com  o  buscar algo..." autocomplete="off" spellcheck="false" />
                <button id="searchButton" class="search-btn">ENTRAR</button>
            </div>

            <!-- Accesos directos (nuevos, sin romper nada) -->
            <div class="quicklinks">
                <div class="ql-label">// acceso rápido</div>
                <span class="qlink" data-url="https://google.com">Google</span>
                <span class="qlink" data-url="https://youtube.com">YouTube</span>
                <span class="qlink" data-url="https://reddit.com">Reddit</span>
                <span class="qlink" data-url="https://twitter.com">Twitter/X</span>
                <span class="qlink" data-url="https://discord.com">Discord</span>
                <span class="qlink" data-url="https://github.com">GitHub</span>
                <span class="qlink" data-url="https://instagram.com">Instagram</span>
                <span class="qlink" data-url="https://spotify.com">Spotify</span>
            </div>

            <!-- Iframe original (mismo id) -->
            <iframe id="iframeWindow" class="iframeWindow"></iframe>
        </div>

        <!-- Footer decorativo -->
        <div class="footer">
            WAEVO PROXY · POWERED BY ULTRAVIOLET · BUILT BY <span>ALEX</span>
        </div>
    </div>

    <!-- Script original example.js (intacto) -->
    <script src="example.js"></script>

    <!-- Pequeño script para los accesos directos (no interfiere con example.js) -->
    <script>
        // Hace que los quicklinks pongan la URL en el input y luego activen el botón
        document.querySelectorAll('.qlink').forEach(link => {
            link.addEventListener('click', () => {
                const url = link.getAttribute('data-url');
                const input = document.getElementById('urlInput');
                const button = document.getElementById('searchButton');
                if (input && button) {
                    input.value = url;
                    button.click();
                }
            });
        });
    </script>
</body>
</html>
