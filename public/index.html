<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waevo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan: #00f5ff;
      --pink: #ff2d6b;
      --purple: #7b2dff;
      --bg: #020810;
      --surface: #060e1a;
      --border: rgba(0,245,255,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #c0d8e8;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    /* Grid animado de fondo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 8s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Orbes de luz */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 10s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: var(--cyan); top: -150px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: var(--purple); bottom: -100px; right: -100px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: var(--pink); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -7s; opacity: 0.07; }

    @keyframes orbFloat {
      0%, 100% { transform: scale(1) translate(0,0); }
      33%       { transform: scale(1.1) translate(20px, -20px); }
      66%       { transform: scale(0.95) translate(-15px, 15px); }
    }

    .search-wrap {
      display: flex;
      position: relative;
      z-index: 1;
    }

    .search-input {
      flex: 1;
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.2);
      border-right: none;
      border-radius: 3px 0 0 3px;
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 1rem 1.2rem;
      outline: none;
      transition: all 0.3s;
      caret-color: var(--cyan);
      width: 400px;
    }

    .search-input::placeholder { color: rgba(0,245,255,0.2); }

    .search-input:focus {
      border-color: rgba(0,245,255,0.6);
      background: rgba(0,245,255,0.07);
      box-shadow: 0 0 30px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,245,255,0.03);
    }

    .search-btn {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border: none;
      border-radius: 0 3px 3px 0;
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 1rem 1.8rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .search-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .search-btn:hover::before { transform: translateX(100%); }
    .search-btn:hover { filter: brightness(1.2); box-shadow: 0 0 25px rgba(0,245,255,0.5); }
    .search-btn:active { transform: scale(0.97); }

    .iframeWindow {
      width: 90%;
      height: 80vh;
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 6px;
      background: #000;
      position: relative;
      z-index: 1;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <!-- Orbes de fondo -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="search-wrap">
    <input type="text" id="urlInput" class="search-input" placeholder="https://google.com  o  buscar algo..." autocomplete="off" spellcheck="false" />
    <button id="searchButton" class="search-btn">ENTRAR</button>
  </div>

  <iframe id="iframeWindow" class="iframeWindow"></iframe>

  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script>
    // Registrar el Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register(__uv$config.sw || '/uv/sw.js', {
          scope: __uv$config.prefix,
        }).then(reg => {
          console.log('SW registrado, scope:', reg.scope);
        }).catch(err => {
          console.error('Error al registrar SW:', err);
        });
      });
    }

    // Función para navegar en el iframe
    function navigate() {
      const input = document.getElementById('urlInput').value.trim();
      if (!input) return;

      let url = input;
      if (!/^https?:\/\//i.test(url)) {
        if (/^[\w-]+(\.\w+)+/.test(url)) {
          url = 'https://' + url;
        } else {
          url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        }
      }

      document.getElementById('iframeWindow').src = __uv$config.prefix + __uv$config.encodeUrl(url);
    }

    document.getElementById('searchButton').addEventListener('click', navigate);
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') navigate();
    });
  </script>
</body>
</html>
